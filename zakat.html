<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&family=Poppins&display=swap" rel="stylesheet">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/style.css">
    <!-- <link rel="stylesheet" href="assets/style.css"> -->

    <title>MR - Kalkulator Zakat</title>
</head>

<body>
    <nav class="navbar">
        <a class="navbar-brand" href="https://mosqueranger.org/">
            <img src="assets/img/logo.svg" alt="" class="logo">
        </a>
        <p class="nav">Kalkulator Zakat</p>
    </nav>
    <div class="banner-zakat">
        <div class="cta">
            <h5>Yuk Hitung <br> Zakatmu Sekarang</h5>
            <button class="btn btn-hitung">Hitung Zakat</button>
        </div>
        <div class="row justify-content-end">
            <img src="assets/img/zakat.svg" alt="" class="vector-zakat">
        </div>
    </div>
    <div class="row jenis-zakat justify-content-around">
        <div class="box text-center align-items-center">
            <img src="assets/img/penghasilan.svg" alt="">
            <h6>Zakat Penghasilan</h6>
        </div>
        <div class="box text-center align-items-center">
            <img src="assets/img/mall.svg" alt="">
            <h6>Zakat Mall</h6>
        </div>
        <div class="box text-center align-items-center">
            <img src="assets/img/fidyah.svg" alt="">
            <h6>Zakat Fidyah</h6>
        </div>
    </div>
    <div class="kalkulator-zakat">
        <h5>Kalkulator Zakat</h5>
        <div class="form-zakat">
            <h6>Jenis Zakat</h6>
            <select class="form-kalkulator form-select form-select-sm" aria-label=".form-select-sm example">
            <option value="penghasilan" selected>Zakat Penghasilan</option>
            <option value="mall">Zakat Mall</option>
            <option value="fidyah">Zakat Fidyah</option>
            </select>
        </div>
        <div class="form-zakat">
            <label for="pendapatan" class="form-label"><h6>Pendapatan</h6></label>
            <input type="text" class="form-control input-pendapatan" id="pendapatan">
        </div>
        <div class="form-zakat">
            <label for="bonus" class="form-label"><h6>Bonus/ THR/ Pendapatan Lainnya</h6></label>
            <input type="text" class="form-control input-bonus" id="bonus">
        </div>
        <div class="row justify-content-center">
            <button type="submit" class="btn btn-hitung">Hitung</button>
        </div>
    </div>
</body>
