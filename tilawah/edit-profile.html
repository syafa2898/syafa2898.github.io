<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">

    <title>Ubah Profil - Tilawah Apps</title>
</head>

<body>
    <div class="body">
        <h1 class="text-center fw-bold title2 mt-5">Ubah Profil</h1>
        <form action="">
            <div class="mb-3 mt-5">
                <label for="name" class="form-label">Nama</label>
                <input type="text" class="form-control" id="name" placeholder="Your Name" value="Sholeh">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Your Email" value="sholeh@gmail.com" disabled>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Telepon</label>
                <input type="text" class="form-control" id="phone" placeholder="Your Number" value="0899123456">
            </div>
            <div class="mb-3">
                <label for="target" class="form-label">Target Harian</label>
                <input type="number" class="form-control" id="target" placeholder="2 Halaman" min="1" value="2">
            </div>
            <!-- <button type="submit" class="btn btn-success btn-tilawah1 w-100 mt-4 mb-4">Daftar</button> -->
        </form>
        <a href="profile.html" class=" btn btn-success btn-tilawah1 w-100 mt-4 mb-4">Update</a>
    </div>

    <div class="menu row justify-content-between text-center">
        <div class="col-2">
            <a href="dashboard.html"><img height="25" class="mb-2 ms-3" src="assets/images/dashboard.svg" alt="">
                <p class="mb-0 text-black-50">Dashboard</p>
            </a>
        </div>
        <div class="col-2">
            <a href="badal.html"><img height="25" class="mb-2" src="assets/images/badal.svg" alt="">
                <p class="mb-0 text-black-50">Badal</p>
            </a>
        </div>
        <div class="col-2">
            <a href="profile.html"><img height="25" class="mb-2" src="assets/images/profile-active.svg" alt="">
                <p class="mb-0 fw-bold">Profile</p>
            </a>
        </div>
    </div>
    <!-- menu -->
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
