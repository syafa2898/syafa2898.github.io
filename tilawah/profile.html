<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">

    <title>Profile - Tilawah Apps</title>
</head>

<body>
    <div class="body header bg-tilawah d-flex row">
        <div class="body align-items-center row justify-content-between">
            <div class="col-6 mt-3">
                <h6 class="subtitle1 mb-0">Assalamualaikum</h6>
                <p>Sholeh</p>
            </div>
            <div class="col-2 avatar">
                <p class="">SF</p>
            </div>
        </div>
        <!-- Header -->
    </div>
    <!-- Body -->

    <div class="body">
        <div class="profile text-center">
            <div class="profile-avatar avatar row pt-3 m-auto mb-3">
                <p class="mt-3">SF</p>
            </div>
            <h3 class="profile-name fw-bold mt-2 mb-0">Sholeh</h3>
            <h5 class="profile-email fw-bold mb-0">sholeh@gmail.com</h5>
        </div>
        <div class="row m-auto justify-content-between text-center">
            <div class="box-profile col-6" style="width: 47%;">
                <h3 class="fw-bold mt-2 mb-0">50</h3>
                <h3 class="">Halaman</h3>
            </div>
            <div class="box-profile col-6" style="width: 47%;">
                <h3 class="fw-bold mt-2 mb-0">10</h3>
                <h3 class="">Juz</h3>
            </div>
        </div>
        <div class="box-profile">
            <div class="row justify-content-between">
                <div class="col-3">
                    <label class="link-profile label-switch" for="flexSwitchCheckChecked">Tilawah</label>
                </div>
                <div class="col-4 form-switch text-end">
                    <input class="form-check-input tilawah-switch" type="checkbox" role="switch" id="flexSwitchCheckChecked" checked>
                </div>
                <hr class="line">
            </div>
            <div class="row">
                <a href="edit-profile.html" class="link-profile">Ubah Profile</a>
                <hr class="line">
            </div>
            <div class="row">
                <a href="#" class="link-profile">Ubah Password</a>
            </div>
        </div>
        <div class="col-11 m-auto mt-4">
            <a href="#" class="btn btn-danger fw-bold w-100">Logout</a>
        </div>
    </div>
    <!-- Body -->

    <div class="menu row justify-content-between text-center">
        <div class="col-2">
            <a href="dashboard.html"><img height="25" class="mb-2 ms-3" src="assets/images/dashboard.svg" alt="">
                <p class="mb-0 text-black-50">Dashboard</p>
            </a>
        </div>
        <div class="col-2">
            <a href="badal.html"><img height="25" class="mb-2" src="assets/images/badal.svg" alt="">
                <p class="mb-0 text-black-50">Badal</p>
            </a>
        </div>
        <div class="col-2">
            <a href="profile.html"><img height="25" class="mb-2" src="assets/images/profile-active.svg" alt="">
                <p class="mb-0 fw-bold">Profile</p>
            </a>
        </div>
    </div>
    <!-- menu -->

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js " integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13 " crossorigin="anonymous "></script>
