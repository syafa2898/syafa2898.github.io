<body>
    <div class="header bg-tilawah">
        <div class="body row justify-content-between">
            <div class="col-6">
                <h6 class="fw-bold m-0">Assalamualaikum</h6>
                <p>Sholeh</p>
            </div>
            <div class="col-2">
                <a href="#">
                    <img class="avatar-thumbnail" src="assets/images/sholeh.jpg" alt="">
                </a>
            </div>
        </div>
    </div>
    <div class="body">
        <div class="banner-tilawah bg-tilawah row justify-content-between w-100 m-auto">
            <div class="col-8 p-0 d-flex align-self-center">
                <h6>"Sebaik - baiknya kalian adalah yang belajar quran dan mengamalkannya."<br> (HR. Bukhari)</h6>
            </div>
            <div class="col-4 d-flex align-self-center">
                <img class="banner-image" src="assets/images/tilawah.svg" alt="">
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <div class="progresss p-3">
                    <h6 class="fw-bold m-0">Progress</h6>
                    <p>JUZ 3/30</p>
                    <div class="progress bg-success">
                        <div class="progress-bar bg-tilawah" role="progressbar" style="width: 10%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="progresss p-3">
                    <h6 class="fw-bold m-0">Finished</h6>
                    <p>15/20 Orang</p>
                    <div class="progress bg-success">
                        <div class="progress-bar bg-tilawah" role="progressbar" style="width: 75%;" aria-valuenow="15" aria-valuemin="0" aria-valuemax="20"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tilawah-list mb-5">
            <h6 class="fw-bold">Tilawah</h6>
            <div class="tilawah-card">
                <div class="row g-0">
                    <div class="tilawah-card-header bg-tilawah p-2 text-center col-2">
                        <img class="w-100" src="assets/images/quran-tilawah.svg" alt="">
                    </div>
                    <div class="card-body col-5">
                        <h6 class="fw-bold m-0">Puasa Senin Kamis</h6>
                        <p>16 & 19 Agustus</p>
                    </div>
                    <div class="col-2 mt-3">
                        <button class="btn btn-success btn-sm" type="button" data-bs-toggle="modal" data-bs-target="#senin-kamis">submit</button>
                    </div>
                </div>
            </div>
