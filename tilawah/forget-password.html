<head>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Lupa Password - Tilawah Apps</title>

<body>
    <div class="header bg-tilawah d-flex justify-content-center">
        <h3 class="title3 align-self-center">Lupa Password</h3>
    </div>

    <div class="vector text-center mt-5 mb-4">
        <img src="assets/images/verif.svg" alt="">
        <p class="fw-bold mb-2 mt-4">Masukan email kamu untuk <br> menerima kode verifikasi</p>
    </div>

    <div class="body pb-5 w-75 m-auto">
        <form action="">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Your Email">
            </div>
            <div class="text-center">
                <!-- <button type="submit" class="btn btn-success btn-tilawah1">Reset</button> -->
                <a href="verif-password.html" class="btn btn-success btn-tilawah1">Reset</a>
            </div>
        </form>
    </div>
