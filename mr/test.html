<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label for="check-cireng">
    <input type="checkbox" id="check-cireng" />
    Do you have Passport?
    </label>
    <hr />
    <div id="product-cireng" style="display: none">
        Passport Number:
        <input type="text" id="txtPassportNumber" />
    </div>
    <div id="AddPassport">
        Add New Password
    </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script>
<script>
    $(function() {
        $("#check-cireng").click(function() {
            if ($(this).is(":checked")) {
                $("#product-cireng").show();
                $("#AddPassport").hide();
            } else {
                $("#product-cireng").hide();
                $("#AddPassport").show();
            }
        });
    });
</script>

</html>
