    <title>MR - You Buy You Donate</title>

<body>
    <div class="nav-ybyd nav-catalogue bg-ybyd">
        <div class="body">
            <div class="row justify-content-between text-white">
                <div class="col-3">
                    <a href="#"><button class="btn btn-back"><img src="assets/img/ybyd2/back-white.svg" class="m-auto"></button></a>
                </div>

                    <p class="mt-3">Form Order</p>
                </div>
            </div>
        </div>
        <!-- Body -->
    </div>
    <!-- Nav-catalogue -->

    <div class="body">
        <div class="form-order p-4 mt-5 row w-100 m-auto d-none">
            <div class="col-4 thumbnail-ybyd"><img src="assets/img/ybyd2/foto1.jpg" class="w-100 "></div>
            <div class="col-8">
                <div class="row">
                    <h5 class="fw-bold">Brownies Donat</h5>
                </div>
                <div class="row">
                    <h6 class="fw-bold">Rp. 99.000</h6>
                </div>
                <div class="row w-100 m-auto">
                    <input type="number" name="" id="">
                </div>
            </div>
        </div>
        <div class="form-order mt-5 p-4 pb-5 pt-0">
            <h4 class="text-center mt-5 fw-bolder mb-5">Form Order </h4>
            <div class="row mt-5 form-order bg-white w-100 m-auto p-3">
                <div class="col-4 thumbnail-ybyd"><img src="assets/img/ybyd2/foto1.jpg" class="w-100 mt-2 mb-2"></div>
                <div class="col-8 mt-1">
                    <div class="row">
                        <h5 class="fw-bold">Brownies Donat</h5>
                    </div>
                    <div class="row">
                        <h6 class="fw-bold">Rp. 99.000</h6>
                    </div>
                    <!-- <div class="row w-100 m-auto">
                        <input type="number" name="" id="">
                    </div> -->
                </div>
            </div>
            <form class="mt-3" method="post" action="form-order2.html">
                <div class="mb-3">
                    <label class="form-label">Type</label>
                    <input name="type" class="form-control" type="text" value="Brownies Donat" aria-label="Disabled input example" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="qty" class="form-label">Jumlah Pesanan</label>
                    <input name="quantity" type="number" class="form-control" id="qty" placeholder="Masukkan Jumlah Pesanan">
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label">Nama</label>
                    <input name="name" type="text" class="form-control" id="name" placeholder="Masukkan Nama">
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Alamat</label>
                    <textarea name="address" type="text" class="form-control" id="address" placeholder="Masukkan Alamat" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label for="kurir" class="form-label">Opsi Pengiriman</label>
                    <select name="delivery" class="form-select" aria-label="Default select example" id="kurir">
                    <option value="gosend">Gosend</option>
                    <option value="grab">Grab</option>
                    <option value="paxel">Paxel</option>
                    <Jption value="jne">Jne</Jption>
                    <option value="cod">Cod</option>
                </select>
                </div>
                <div class="mb-3">
                    <label for="favour" class="form-label">Varian/ Rasa</label>
                    <input name="favour" type="text" class="form-control" id="favour" placeholder="Masukkan Varian/ Rasa">
                </div>
                <div class="mb-3">
                    <label for="note" class="form-label">Catatan</label>
                    <textarea name="note" type="text" class="form-control" rows="3" id="note" placeholder="Masukkan Catatan"></textarea>
                </div>
                <button type="submit" class="btn btn-order bg-ybyd text-white w-100 mb-5">Submit</button>
            </form>
        </div>
    </div>

    <div class="footer"></div>

    <!-- Optional JavaScript; choose one of the two! -->
