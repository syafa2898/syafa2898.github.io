<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css" />
    <style>
        webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>

    <title>Buat Pesanan - You Buy You Donate</title>
</head>

<body>
    <div class="nav-dashboard pink">
        <div class="body">
            <div class="row justify-content-between">
                <div class="col-4">
                    <img src="logo.jpg" class="logo" />
                </div>
                <div class="col-8 text-end">
                    <h6 class="m-0 fw-bold">Buat Pesanan</h6>
                    <p>Diyan Nur</p>
                </div>
            </div>
        </div>
        <!-- Body -->
    </div>
    <!-- Nav-dashboard -->

    <div class="body pb-5">
        <div class="form-order mt-5 p-4 pt-5">
            <h4 class="text-center fw-bolder mb-5">Form Order </h4>
            <form class="mt-3">
                <div class="type mb-3">
                    <h6>Jenis</h6>
                    <div class="type mb-3">
                        <!-- <h6>Keranjang Belanja</h6> -->
                        <div class="row">
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="input-cireng">
                                    <label class="form-check-label" for="input-cireng">Cireng</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="input-brownies-sekat">
                                    <label class="form-check-label" for="input-brownies-sekat">Brownies Sekat</label>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="input-brownies-donat">
                                    <label class="form-check-label" for="input-brownies-donat">Brownies Donat</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="input-kebab">
                                    <label class="form-check-label" for="input-kebab">Kebab</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="product row border g-0 mt-3 p-3 radius" id="product-cireng" style="display: none">
                        <div class="col-3 me-3 align-self-center">
                            <div class="thumbnail-ybyd">
                                <img src="foto1.jpg" class="img-fluid">
                            </div>
                        </div>
                        <div class="col-6">
                            <input name="type" value="cireng" type="text" class="border-0 fw-bold bg-white mb-1" id="name" disabled>
                            <button onclick="counterMin()" id="minus" class="btn btn-sm btn-primary">-</button>
                            <input type="number" name="qty" value="1" min="1" max="100" class="border-0 w-25 text-center" id="counter">
                            <button onclick="counterPlus()" class="btn btn-sm btn-primary">+</button>
                            <input type="text" name="notes" id="notes-cireng" placeholder="Catatan" class="form-control mt-2 form-control-sm">
                        </div>
                    </div>
                    <div class="product row border g-0 mt-3 p-3 radius" id="product-brownies-donat" style="display: none">
                        <div class="col-3 me-3 align-self-center">
                            <div class="thumbnail-ybyd">
                                <img src="foto2.jpg" class="img-fluid">
                            </div>
                        </div>
                        <div class="col-6">
                            <input name="type" value="brownies-donat" type="text" class="border-0 fw-bold bg-white mb-1" id="name" disabled>
                            <button onclick="counterMin()" id="minus" class="btn btn-sm btn-primary">-</button>
                            <input type="number" name="qty" value="1" min="1" max="100" class="border-0 w-25 text-center" id="counter">
                            <button onclick="counterPlus()" class="btn btn-sm btn-primary">+</button>
                            <input type="text" name="notes" id="notes-brownies-donat" placeholder="Catatan" class="form-control mt-2 form-control-sm">
                        </div>
                    </div>
                    <div class="product row border g-0 mt-3 p-3 radius" id="product-brownies-sekat" style="display: none">
                        <div class="col-3 me-3 align-self-center">
                            <div class="thumbnail-ybyd">
                                <img src="foto3.jpg" class="img-fluid">
                            </div>
                        </div>
                        <div class="col-6">
                            <input name="type" value="brownies-sekat" type="text" class="border-0 fw-bold bg-white mb-1" id="name" disabled>
                            <button onclick="counterMin()" id="minus" class="btn btn-sm btn-primary">-</button>
                            <input type="number" name="qty" value="1" min="1" max="100" class="border-0 w-25 text-center" id="counter">
                            <button onclick="counterPlus()" class="btn btn-sm btn-primary">+</button>
                            <input type="text" name="notes" id="notes-brownies-sekat" placeholder="Catatan" class="form-control mt-2 form-control-sm">
                        </div>
                    </div>
                    <div class="product row border g-0 mt-3 p-3 radius" id="product-kebab" style="display: none">
                        <div class="col-3 me-3 align-self-center">
                            <div class="thumbnail-ybyd">
                                <img src="foto4.jpg" class="img-fluid">
                            </div>
                        </div>
                        <div class="col-6">
                            <input name="type" value="kebab" type="text" class="border-0 fw-bold bg-white mb-1" id="name" disabled>
                            <button onclick="counterMin()" id="minus" class="btn btn-sm btn-primary">-</button>
                            <input type="number" name="qty" value="1" min="1" max="100" class="border-0 w-25 text-center" id="counter">
                            <button onclick="counterPlus()" class="btn btn-sm btn-primary">+</button>
                            <input type="text" name="notes" id="notes-kebab" placeholder="Catatan" class="form-control mt-2 form-control-sm">
                        </div>
                    </div>
                    <!-- <div class="row">
                        <div class="col-6">
                            <input name="type" value="cireng" type="text" class="border-0 fw-bold bg-white mb-1" id="name" disabled>
                            <input type="number" name="qty" value="1" min="1" max="100" class="border-0 w-25 text-center" id="counter">
                        </div>
                    </div> -->
                </div>
                <div class="mb-3">
                    <label for="nama" class="form-label">Nama</label>
                    <input name="name" type="text" class="form-control" id="nama" placeholder="Masukkan Nama">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">No Telp</label>
                    <input name="phone" type="number" class="form-control" id="phone" placeholder="Masukkan No Telepon">
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Alamat</label>
                    <textarea name="address" type="text" class="form-control" id="address" placeholder="Masukkan Alamat" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label for="kurir" class="form-label">Opsi Pengiriman</label>
                    <select name="delivery" class="form-select" aria-label="Default select example" id="kurir">
                    <option value="gosend">Gosend</option>
                    <option value="grab">Grab</option>
                    <option value="paxel">Paxel</option>
                    <option value="jne">Jne</option>
                    <option value="cod">Cod</option>
                </select>
                </div>
                <div class="mb-3">
                    <label for="note" class="form-label">Catatan</label>
                    <textarea name="note" type="text" class="form-control" rows="3" id="note" placeholder="Masukkan Catatan"></textarea>
                </div>
                <button type="submit" class="mt-3 btn pink w-100 mb-5 fw-bolder">Submit</button>
            </form>
        </div>
    </div>
    <!-- body -->

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script>

    <script>
        // const counter = document.getElementById("counter");
        // let counterValue = counter.value;

        // function counterPlus() {
        //     counter.value = ++counter.value;
        // }

        // function counterMin() {
        //     counter.value = --counter.value;
        // }
        $(function() {
            $("#input-cireng").click(function() {
                if ($(this).is(":checked")) {
                    $("#product-cireng").show();
                } else {
                    $("#product-cireng").hide();
                }
            });
        });

        $(function() {
            $("#input-brownies-sekat").click(function() {
                if ($(this).is(":checked")) {
                    $("#product-brownies-sekat").show();
                } else {
                    $("#product-brownies-sekat").hide();
                }
            });
        });

        $(function() {
            $("#input-brownies-donat").click(function() {
                if ($(this).is(":checked")) {
                    $("#product-brownies-donat").show();
                } else {
                    $("#product-brownies-donat").hide();
                }
            });
        });

        $(function() {
            $("#input-kebab").click(function() {
                if ($(this).is(":checked")) {
                    $("#product-kebab").show();
                } else {
                    $("#product-kebab").hide();
                }
            });
        });
    </script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
</body>

</html>
