<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/dashboard/assets/css/style.css">
</head>

<body>
    <div class="row">
        <div class="col-lg-7 col-md-7 bg-gray text-center side-login side-auth">
            <img src="assets/login/images/login.png" alt="login" class="vector-login">
        </div>
        <div class="col-lg-5 col-md-5 p-70 d-flex">
            <div class="content align-self-center">
                <h5 class="fw-bold">Selamat datang di e-Trade! <span style='font-size:25px;'>&#128075;</span></h5>
                <h6 class="">Silahkan masukkan kredensial yang telah anda miliki dibawah ini</h6>
                <div class="form">
                    <form>
                        <div class="mb-3 mt-4">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="johndoe@gmail.com">
                        </div>
                        <div class="mb-3">
                            <div class="row">
                                <div class="col-6">
                                    <label for="password" class="form-label">Password</label>
                                </div>
                                <div class="col-6 text-end">
                                    <a href="forget-password.html" class="font-color1 text-decoration-none">Lupa Password</a>
                                </div>
                            </div>
                            <input type="password" class="form-control" id="password">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">Ingat Saya</label>
                        </div>
                        <!-- <button type="submit" class="btn btn-cyan w-100 text-white mt-3">Login</button> -->
                        <a href="grup-akses.html" class="btn btn-cyan w-100 text-white mt-3">Login</a>
                    </form>
                    <div class="row text-center mt-3">
                        <a href="register.html" class="text-center font-color1 text-decoration-none">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
</body>

</html>
