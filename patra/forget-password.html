<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/dashboard/assets/css/style.css">
</head>

<body>
    <div class="row">
        <div class="col-lg-7 col-md-7 bg-gray text-center side-login side-auth">
            <img src="assets/login/images/forgot-password.svg" alt="forget-password" class="vector-login">
        </div>
        <div class="col-lg-5 col-md-5 p-70 d-flex">
            <div class="content align-self-center">
                <h5 class="fw-bold">Lupa Password?</h5>
                <h6 class="">Silahkan masukkan email anda, kami akan kirimkan instruksi untuk mereset password</h6>
                <div class="form">
                    <form>
                        <div class="mb-3 mt-5">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="johndoe@gmail.com">
                        </div>
                        <button type="submit" class="btn btn-small btn-cyan w-100 text-white mt-3">Kirim link lupa password</button>
                    </form>
                    <div class="row text-center mt-3">
                        <a href="#" class="text-center font-color1 text-decoration-none"> <i class="fa-solid fa-angle-left me-2"></i>Kembali</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
    <!-- font awesome -->
    <script defer src="https://use.fontawesome.com/releases/v6.1.1/js/all.js" integrity="sha384-xBXmu0dk1bEoiwd71wOonQLyH+VpgR1XcDH3rtxrLww5ajNTuMvBdL5SOiFZnNdp" crossorigin="anonymous"></script>
</body>

</html>
