<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <title>Password Baru - Tilawah Apps</title>
</head>

<body>
    <div class="header bg-tilawah d-flex justify-content-center">
        <h3 class="title3 align-self-center">Membuat Password Baru</h3>
    </div>

    <div class="vector text-center mt-5 mb-5">
        <img src="assets/images/forget-password.svg" alt="">
        <p class="fw-bold mb-2 mt-4">Silahkan masukkan <br> password baru anda</p>
    </div>

    <div class="body pb-5 w-75 m-auto">
        <form action="">
            <div class="mb-3">
                <label for="floatingPassword" class="form-label">Password Baru</label>
                <div class="input-group flex-nowrap">
                    <input type="password" class="form-control" placeholder="Your Password" id="floatingPassword" aria-label="Password" aria-describedby="addon-wrapping">
                    <span class="input-group-text show-password2" id="addon-wrapping" onclick="showPassword()">
                        <i class="bi bi-eye-fill" id="eye"></i>
                    </span>
                </div>
            </div>
            <div class="mb-3">
                <label for="confirm-password" class="form-label">Konfirmasi Password</label>
                <div class="input-group flex-nowrap">
                    <input type="password" class="form-control" placeholder="Your Password" id="confirm-password" aria-label="Password" aria-describedby="addon-wrapping">
                    <span class="input-group-text show-password2" id="addon-wrapping" onclick="showConfirmPassword()">
                        <i class="bi bi-eye-fill" id="eye-confirm"></i>
                    </span>
                </div>
            </div>
            <!-- <div class="mb-3">
                <label for="password" class="form-label">Password Baru</label>
                <input type="password" class="form-control" id="password" placeholder="Your Password">
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Your Password">
            </div> -->
            <div class="text-center">
                <!-- <button type="submit" class="btn btn-success btn-tilawah1">Save</button> -->
                <a href="login.html" class="btn btn-success btn-tilawah1">Save</a>
            </div>
        </form>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js " integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p " crossorigin="anonymous "></script>
    <script src="assets/js/script.js"></script>
    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js " integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB " crossorigin="anonymous "></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js " integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13 " crossorigin="anonymous "></script>
    -->
</body>

</html>
